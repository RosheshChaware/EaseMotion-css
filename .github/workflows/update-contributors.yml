name: Update Contributors

on:
  pull_request:
    types: [closed]
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

jobs:
  update-contributors:
    if: github.event_name != 'pull_request' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch contributors and update README
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            // Fetch contributors sorted by contribution count
            const { data } = await github.rest.repos.listContributors({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 30,
            });

            // Filter out bots
            const humans = data.filter(
              c => c.type !== 'Bot' && !c.login.toLowerCase().includes('bot')
            );

            // Build table rows
            const rows = humans.map((c, i) =>
              `| ${i + 1} | [@${c.login}](https://github.com/${c.login}) | ${c.contributions} |`
            ).join('\n');

            const newBlock = [
              '<!-- CONTRIBUTORS-TABLE-START -->',
              '> 📌 Top contributors — auto-updated by GitHub Actions on every merge.',
              '',
              '| # | Contributor | Contributions |',
              '|---|-------------|:-------------:|',
              rows,
              '<!-- CONTRIBUTORS-TABLE-END -->',
            ].join('\n');

            // Read README
            let readme = fs.readFileSync('README.md', 'utf8');

            // Replace between markers
            const pattern = /<!-- CONTRIBUTORS-TABLE-START -->[\s\S]*?<!-- CONTRIBUTORS-TABLE-END -->/;
            if (!pattern.test(readme)) {
              core.setFailed('Could not find CONTRIBUTORS-TABLE markers in README.md');
              return;
            }

            const updated = readme.replace(pattern, newBlock);

            if (updated === readme) {
              console.log('No changes to contributors table.');
              return;
            }

            fs.writeFileSync('README.md', updated, 'utf8');
            console.log(`Updated contributors table with ${humans.length} contributors.`);

      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git diff --quiet README.md && echo "No changes." || (
            git add README.md &&
            git commit -m "chore: auto-update contributors table [skip ci]" &&
            git push
          )
